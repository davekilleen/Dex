# Dex Productivity Integrations Config
# This tracked file is a clean-install template. /integrate-mcp populates each
# user's local integration state when they choose to connect a service.

# Last updated: (auto-populated when integrations change)
last_updated: null

# Enabled integrations
enabled:
  notion: false
  slack: false
  google: false

# Integration-specific settings are stored in separate files:
# - notion.yaml (Notion-specific config)
# - slack.yaml (Slack-specific config)
# - google.yaml (Google-specific config)

# Integration hooks - which Dex features use integrations
hooks:
  meeting_prep:
    use_notion: false     # Pull relevant Notion docs
    use_slack: false      # Pull recent Slack context with attendees
    use_google: false     # Pull email threads with attendees
  
  person_pages:
    use_notion: false     # Link Notion pages
    use_slack: false      # Show Slack mentions
    use_google: false     # Show email history
  
  daily_plan:
    use_notion: false     # Not used by default
    use_slack: false      # Not used by default
    use_google: false     # Surface emails needing response

# Detection cache (auto-populated by detect.py)
detected:
  notion: null
  slack: null
  google: null
