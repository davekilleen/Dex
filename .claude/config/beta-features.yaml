# Beta Features Configuration
#
# Defines beta features available for early access activation.
# Each feature requires a valid activation code to unlock.
#
# Code hashes are SHA-256 of "salt:code" for security.

version: "1.0"
last_updated: "2026-04-04"

settings:
  # Master switch for beta system
  enabled: true

  # What to do with invalid activation codes
  # Options: "warn" (show message), "silent" (ignore), "log" (write to file)
  invalid_code_behavior: "warn"

  # Days before activation expires (0 = never)
  default_expiration_days: 0

features:
  pi:
    name: "Pi Integration"
    description: "Self-extending AI capabilities via Pi coding agent. Enables Claude Code to delegate complex coding tasks to Pi for autonomous implementation."
    version: "0.1.0"
    status: "active"
    code_hash: "132c75e90486e363d667ed51ca8e4e4bbfe24a251765e5d00cea97df2bcf687c"
    code_salt: "pi-beta-2026"
    instructions_file: "System/Beta/pi/README.md"
    capabilities:
      - "pi_delegate"
      - "pi_review"
      - "pi_bridge"
    min_dex_version: "1.0.0"
    feature_flags:
      enable_pi_tools: true
      enable_pi_mcp: true

  screenpipe:
    name: "ScreenPipe Integration"
    description: "Ambient work intelligence - Dex learns what you're working on via screen OCR. Work apps only, all browsers and personal apps blocked. 30-day auto-delete."
    version: "0.1.0"
    status: "active"
    code_hash: "082f043791d749d691491c57f64b10e2c2c81b041306fcbaecdc6becc259355c"
    code_salt: "screenpipe-beta-2026"
    instructions_file: ".claude/reference/beta-templates/screenpipe/README.md"
    capabilities:
      - "screenpipe_setup"
      - "screenpipe_query"
      - "screenpipe_time_audit"
    min_dex_version: "1.3.0"
    feature_flags:
      enable_screenpipe_skill: true
      enable_screen_recall: true
      enable_time_audit: true

