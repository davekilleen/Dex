name: Dex CI
# Push runs cover main (and release automation); PRs get exactly ONE run via
# the pull_request event instead of the former duplicated push+PR pair.
on:
  push:
    branches: [main, beta]
    tags: ['v*']
  pull_request:
  # Merge queue: CI validates the QUEUED BATCH exactly as it will land on main,
  # then everything in the batch merges together on one green run.
  merge_group:
# A superseded push to the same PR/branch cancels its stale in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  quality:
    runs-on: macos-latest
    env:
      VAULT_PATH: core/tests/fixtures/vault
      COVERAGE_MIN_TOTAL: "25"
      COVERAGE_MIN_TOUCHED: "10"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install Python dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install mcp pyyaml python-dateutil requests
      - run: npm ci
      - name: Ensure policy scripts are executable
        run: chmod +x scripts/check-*.sh scripts/check-coverage-threshold.py scripts/check-path-contract-usage.sh scripts/security-gate.sh scripts/benchmark_large_vault.py
      - name: Governance docs present
        run: |
          test -f docs/testing-governance.md || { echo "Missing required governance document docs/testing-governance.md"; exit 1; }
      - name: Hook harness tests
        run: npm run test:hooks
      - name: Script library tests
        run: npm run test:scripts
      - name: Diff-aware test gate
        if: github.event_name == 'pull_request'
        run: bash scripts/check-test-delta.sh
      - name: PII and personal-config gate
        if: github.event_name == 'pull_request'
        run: bash scripts/check-pii.sh
      - name: Path-contract usage gate
        if: github.event_name == 'pull_request'
        run: bash scripts/check-path-contract-usage.sh
      - name: Documentation drift gate
        if: github.event_name == 'pull_request'
        run: bash scripts/check-doc-drift.sh
      - name: Architecture inventory drift gate
        run: bash scripts/check-architecture-inventory.sh
      - name: Instructed-tool existence gate
        run: python scripts/check-instructed-tools.py
      - name: Create vault directories
        run: python -c "from core import paths; from pathlib import Path; [getattr(paths, n).mkdir(parents=True, exist_ok=True) for n in dir(paths) if n.endswith('_DIR') and isinstance(getattr(paths, n), Path)]"
      - name: Generate paths.json
        run: python core/paths.py
      - name: Ruff linting (fail fast)
        run: ruff check core/
      - name: Test suites + coverage
        run: pytest core/tests/ core/mcp/tests/ core/migrations/tests/ -v -m "not fuzz" --junitxml=.logs/pytest-report.xml --cov=core --cov-report=term --cov-report=json:coverage.json --cov-fail-under="${COVERAGE_MIN_TOTAL}"
      - name: Touched-file coverage gate
        if: github.event_name == 'pull_request'
        run: python scripts/check-coverage-threshold.py
      - name: Large-vault performance budget
        run: python scripts/benchmark_large_vault.py --files 1500 --budget-seconds 5.0
      - name: Security gate
        run: bash scripts/security-gate.sh
      - name: Portable-vault contract gate
        run: bash scripts/check-portable-contract.sh
      - name: Founder-content gate
        run: bash scripts/check-founder-content.sh
      - name: Distribution safety check
        run: bash scripts/verify-distribution.sh
      - name: Path consistency check
        run: bash scripts/check-path-consistency.sh
      - name: Upload release health inputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-health-inputs
          path: |
            .logs/pytest-report.xml
            coverage.json
          if-no-files-found: error
          retention-days: 1

  pr-report:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Render plain-English PR report
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REPORT_FILE: ${{ runner.temp }}/dex-pr-report.md
          CHANGED_FILES: ${{ runner.temp }}/dex-pr-files.txt
        run: |
          git diff --name-only --diff-filter=ACMRD "$BASE_SHA...HEAD" > "$CHANGED_FILES"
          python3 scripts/pr_report.py --files-from "$CHANGED_FILES" > "$REPORT_FILE"
          cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"
      # pull_request tokens from forks can be read-only. The report is already in
      # the job summary, so a denied comment write is informative, never a CI failure.
      - name: Upsert sticky PR comment when token permissions allow
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPORT_FILE: ${{ runner.temp }}/dex-pr-report.md
        run: |
          if COMMENT_ID="$(gh api --paginate "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- dex-pr-report -->"))) | .id' | head -n 1)"; then
            if [ -n "$COMMENT_ID" ]; then
              if gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --field body=@"$REPORT_FILE" >/dev/null; then
                echo "Updated the sticky PR report comment."
              else
                echo "::warning::The token cannot update PR comments (common for forks); use the job summary report."
              fi
            elif gh api --method POST "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --field body=@"$REPORT_FILE" >/dev/null; then
              echo "Created the sticky PR report comment."
            else
              echo "::warning::The token cannot create PR comments (common for forks); use the job summary report."
            fi
          else
            echo "::warning::The token cannot read PR comments (common for forks); use the job summary report."
          fi

  build-release:
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      release_sha: ${{ steps.release_build.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Build release branch
        id: release_build
        run: |
          bash scripts/build-release.sh
          echo "release_sha=$(git rev-parse release)" >> "$GITHUB_OUTPUT"
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="dist/release/v${VERSION}-$(git rev-parse --short release)"
          git rev-parse --verify "refs/tags/$RELEASE_TAG"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
      - name: Push release branch and immutable tag
        run: |
          git push origin release --force
          git push origin "${{ steps.release_build.outputs.release_tag }}"
      - name: Build self-contained vault bundle
        run: bash scripts/build-vault-bundle.sh
      - name: Upload vault bundle to versioned GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          # Create the release (and its git tag, at this commit) only if absent.
          # --notes-from-tag needs a pre-existing annotated tag, which the release
          # process never makes; let gh create the tag and generate notes instead.
          if ! gh release view "v$VERSION" >/dev/null 2>&1; then
            gh release create "v$VERSION" \
              --target "$GITHUB_SHA" \
              --title "v$VERSION" \
              --generate-notes
          fi
          gh release upload "v$VERSION" \
            "dist/dex-vault-bundle-v$VERSION.tar.gz" \
            "dist/dex-vault-bundle-v$VERSION.tar.gz.sha256" \
            --clobber

  build-release-beta:
    needs: quality
    if: github.ref == 'refs/heads/beta' && github.event_name == 'push'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Build beta release branch
        id: release_build
        run: |
          bash scripts/build-release.sh --source beta --target release-beta
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="dist/release-beta/v${VERSION}-$(git rev-parse --short release-beta)"
          git rev-parse --verify "refs/tags/$RELEASE_TAG"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
      - name: Push beta release branch and immutable tag
        run: |
          git push origin release-beta --force
          git push origin "${{ steps.release_build.outputs.release_tag }}"
      - name: Build self-contained vault bundle
        run: bash scripts/build-vault-bundle.sh
      - name: Publish beta vault bundle as a GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          # SAFETY: the beta lane must never be able to touch a stable release asset.
          # Guard 1 — refuse unless this is a prerelease version (X.Y.Z-<pre>, e.g.
          # 1.62.0-beta.1). A bare X.Y.Z is a stable version; publishing it from the
          # beta branch could collide with — and clobber — a real stable release.
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z.]+$'; then
            echo "Refusing: beta version '$VERSION' is not a prerelease (expected X.Y.Z-<pre>, e.g. 1.62.0-beta.1)." >&2
            echo "The beta branch must carry a prerelease version so it can never overwrite a stable release." >&2
            exit 1
          fi
          # Guard 2 — if a release with this tag already exists, it MUST already be a
          # prerelease before we upload/clobber. Never overwrite a promoted/stable release.
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            IS_PRERELEASE="$(gh release view "v$VERSION" --json isPrerelease -q .isPrerelease)"
            if [ "$IS_PRERELEASE" != "true" ]; then
              echo "Refusing: release v$VERSION exists but is not a prerelease; the beta lane will not clobber it." >&2
              exit 1
            fi
          else
            gh release create "v$VERSION" \
              --target "$GITHUB_SHA" \
              --title "v$VERSION" \
              --prerelease \
              --generate-notes
          fi
          gh release upload "v$VERSION" \
            "dist/dex-vault-bundle-v$VERSION.tar.gz" \
            "dist/dex-vault-bundle-v$VERSION.tar.gz.sha256" \
            --clobber

  deploy-health:
    needs: [quality, build-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.quality.result == 'success' && needs['build-release'].result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download release health inputs
        uses: actions/download-artifact@v4
        with:
          name: release-health-inputs
          path: .
      - name: Build release health page
        env:
          SOURCE_SHA: ${{ github.sha }}
          RELEASE_SHA: ${{ needs['build-release'].outputs.release_sha }}
        run: |
          python scripts/build-health-json.py \
            --source-sha "$SOURCE_SHA" \
            --release-sha "$RELEASE_SHA" \
            --workflow-run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --quality-conclusion success \
            --output health.json
          python scripts/render-health-page.py --input health.json --output public/health.html
      - name: Configure GitHub Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@v5
      - name: Explain Pages setup skip
        if: steps.pages.outcome != 'success'
        run: echo "::notice::Health page not deployed because GitHub Pages is not enabled. Enable Settings → Pages → GitHub Actions."
      - name: Upload GitHub Pages artifact
        if: steps.pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy health page
        if: steps.pages.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v4
