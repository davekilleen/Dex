name: Nightly Quality

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    tags:
      - "v*-rc*"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    env:
      VAULT_PATH: core/tests/fixtures/vault
      SECURITY_STRICT_AUDIT: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install mcp pyyaml python-dateutil requests
          npm ci

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/detect-flaky-tests.sh
          chmod +x scripts/security-gate.sh
          chmod +x scripts/benchmark_large_vault.py

      - name: Hook tests
        run: npm run test:hooks

      - name: Flaky test detection
        run: bash scripts/detect-flaky-tests.sh

      - name: Property-based fuzz tests
        run: pytest core/tests/test_fuzz_properties.py -m fuzz -q

      - name: Large-vault performance benchmark
        run: python scripts/benchmark_large_vault.py --files 4000 --budget-seconds 8.0

      - name: Security gate
        run: bash scripts/security-gate.sh

      - name: Upload flaky reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: nightly-quality-artifacts
          path: .logs/flaky/

  adoption-gates:
    name: Adoption journey + 100k performance gate
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install mcp pyyaml python-dateutil requests

      - name: Messy-vault adoption journey
        run: |
          mkdir -p .logs/adoption-gates
          pytest core/tests/test_adoption_messy_vault_journey.py -q \
            --junitxml=.logs/adoption-gates/messy-vault-junit.xml

      - name: 100k-file adoption performance budget
        run: |
          python scripts/benchmark_adoption_engine.py --files 100000 \
            | tee .logs/adoption-gates/benchmark-100k.json

      - name: Upload adoption gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: adoption-gate-evidence
          path: .logs/adoption-gates/
          if-no-files-found: warn
