name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  quality:
    uses: ./.github/workflows/ci.yml

  github-release:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and verify distributed release commit
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION." >&2
            exit 1
          fi
          DEX_RELEASE_SOURCE="$GITHUB_SHA" bash scripts/build-release.sh
          RELEASE_ARTIFACT=$(mktemp -d "$RUNNER_TEMP/dex-release-artifact.XXXXXX")
          git archive release | tar -x -C "$RELEASE_ARTIFACT"
          node "$RELEASE_ARTIFACT/core/update/ownership.cjs" --validate "$RELEASE_ARTIFACT/System/.installed-files.manifest"
          node -e 'require(process.argv[1]); require(process.argv[2]);' \
            "$RELEASE_ARTIFACT/core/update/apply-update.cjs" \
            "$RELEASE_ARTIFACT/core/migrations/v1-to-v2-brain-vault-split.cjs"
          RELEASE_OID=$(git rev-parse release^{commit})
          DIST_OID=$(git rev-parse "dist-v${VERSION}^{commit}")
          if [ "$RELEASE_OID" != "$DIST_OID" ]; then
            echo "The dist tag does not point at the stripped release commit." >&2
            exit 1
          fi

      - name: Publish release branch and immutable dist tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git push --atomic origin \
            "+refs/heads/release:refs/heads/release" \
            "refs/tags/dist-v${VERSION}:refs/tags/dist-v${VERSION}"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for matching in CHANGELOG
          SEMVER="${VERSION#v}"
          # Extract the section for this version (between two ## headers)
          BODY=$(sed -n "/^## \[${SEMVER}\]/,/^## \[/{ /^## \[${SEMVER}\]/d; /^## \[/d; p; }" CHANGELOG.md)
          # Use heredoc delimiter to handle multi-line output
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
